---
name: ci
on:
  - push
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          # 1.27 is not yet GA; pin the release candidate that ships generic methods.
          go-version: "1.27.0-rc.2"
      # golangci-lint is temporarily disabled: staticcheck (honnef.co/go/tools)
      # panics on go1.27 generic-method syntax. Re-add the step once upstream
      # ships go1.27 support.
      - run: go test -v -race ./... -covermode=atomic -coverprofile=coverage.out
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.out
