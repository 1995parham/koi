---
name: ci
on:
  - push
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          # 1.27 is not yet GA; pin the release candidate that ships generic methods.
          go-version: "1.27.0-rc.2"
      - name: golangci-lint
        # golangci-lint's prebuilt binaries are built with go1.26 and refuse to
        # lint a module targeting go1.27. Build from source with the active
        # go1.27 toolchain until upstream ships a release built on go1.27.
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run
      - run: go test -v -race ./... -covermode=atomic -coverprofile=coverage.out
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.out
