---
name: ci
on:
  - push
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.27"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --enable-all
      - run: go test -v -race ./... -covermode=atomic -coverprofile=coverage.out
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.out
